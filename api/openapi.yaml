openapi: 3.0.3
info:
  title: Dispatch Public API
  version: 0.1.0
  description: 公開エッジ(ブラウザ SPA・将来の 3rd party)向け REST 契約。spec-first。
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: liveness probe(依存に関係なく常に 200)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /readyz:
    get:
      operationId: getReadyz
      summary: readiness probe(依存 = DB 疎通を確認)
      responses:
        "200":
          description: 依存先に到達可能
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: 依存先に到達不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
