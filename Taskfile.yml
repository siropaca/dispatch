version: "3"

# タスクはここに一元化する(ADR-0009)。未実装のものは該当マイルストーンで実装する。

tasks:
  default:
    desc: タスク一覧を表示
    cmds:
      - task --list
    silent: true

  setup:
    desc: toolchain・依存を導入し git hooks を設定する
    cmds:
      - mise install
      - pnpm install
      - lefthook install

  db:up:
    desc: "ローカル Postgres を起動 (M2)"
    cmds:
      - docker compose -f deploy/docker/docker-compose.yml up -d

  db:down:
    desc: "ローカル Postgres を停止 (M2)"
    cmds:
      - docker compose -f deploy/docker/docker-compose.yml down

  dev:
    desc: "api と web を同時起動"
    deps:
      - api:dev
      - web:dev

  api:dev:
    desc: "api を起動"
    dir: backend
    cmds:
      - go run ./cmd/api

  web:dev:
    desc: "web を起動"
    dir: apps/web
    cmds:
      - pnpm dev

  web:build:
    desc: "web をビルド"
    dir: apps/web
    cmds:
      - pnpm build

  test:
    desc: "テスト (go test。web テストは今後追加)"
    cmds:
      - cd backend && go test ./...

  lint:
    desc: "lint (go + web)"
    cmds:
      - cd backend && golangci-lint run
      - biome check .

  gen:
    desc: "codegen: sqlc / oapi-codegen / openapi-typescript / buf"
    cmds:
      - cd backend && sqlc generate
      - cd backend && go tool oapi-codegen -config internal/platform/httpapi/config.yaml ../api/openapi.yaml
      - cd packages/api-client && pnpm gen
      - buf generate

  migrate:
    desc: "DB マイグレーション適用 (goose up)。要 DATABASE_URL"
    dir: backend
    cmds:
      - goose -dir db/migrations postgres "$DATABASE_URL" up

  migrate:status:
    desc: "マイグレーション状態を表示。要 DATABASE_URL"
    dir: backend
    cmds:
      - goose -dir db/migrations postgres "$DATABASE_URL" status
