version: "3"

# タスクはここに一元化する(ADR-0009)。未実装のものは該当マイルストーンで実装する。

tasks:
  default:
    desc: タスク一覧を表示
    cmds:
      - task --list
    silent: true

  setup:
    desc: toolchain を導入する(mise)
    cmds:
      - mise install

  db:up:
    desc: "ローカル Postgres を起動 (M2)"
    cmds:
      - docker compose -f deploy/docker/docker-compose.yml up -d

  db:down:
    desc: "ローカル Postgres を停止 (M2)"
    cmds:
      - docker compose -f deploy/docker/docker-compose.yml down

  dev:
    desc: "api / web をローカル起動 (M3 / M5)"
    cmds:
      - 'echo "TODO: M3 / M5 で実装"'

  test:
    desc: "テスト (M3+)"
    cmds:
      - 'echo "TODO: M3 で go test / vitest を実装"'

  lint:
    desc: "lint (M6)"
    cmds:
      - 'echo "TODO: M6 で golangci-lint / biome を実装"'

  gen:
    desc: "codegen: sqlc / buf / openapi (M4 / M7)"
    cmds:
      - 'echo "TODO: M4 / M7 で実装"'

  migrate:
    desc: "マイグレーション適用 (M4)"
    cmds:
      - 'echo "TODO: M4 で goose を実装"'
