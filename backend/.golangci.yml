version: "2"

linters:
  default: standard
  enable:
    - depguard
  settings:
    depguard:
      rules:
        # DDD: domain は infra(DB ドライバ・HTTP FW 等)に依存しない。
        # context が増えたら越境禁止ルールをここに追加する。
        domain-no-infra:
          files:
            - "**/internal/*/domain/**"
          deny:
            - pkg: github.com/jackc/pgx
              desc: "domain は DB ドライバに依存しない(port 経由で adapters へ)"
            - pkg: github.com/go-chi/chi
              desc: "domain は HTTP フレームワークに依存しない"

formatters:
  enable:
    - gofmt
    - goimports
